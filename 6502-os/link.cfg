# ld65 configuration for the breadboard computer:
#   $0000-$5fff  RAM
#   $6000-$600f  memory-mapped I/O
#   $8000-$ffff  EEPROM

SYMBOLS {
    # cc65's software stack starts one byte above RAM and grows downward.
    __STACKSTART__: type = weak, value = $6000;
}

MEMORY {
    ZP:      file = "", define = yes, start = $0000, size = $0100, type = rw;
    RAM:     file = "", define = yes, start = $0200, size = $5e00, type = rw;
    ROM:     file = %O, fill = yes, fillval = $ea,
             start = $8000, size = $7ffa, type = ro;
    VECTORS: file = %O, fill = yes, fillval = $ea,
             start = $fffa, size = $0006, type = ro;
}

SEGMENTS {
    ZEROPAGE: load = ZP,      type = zp;
    STARTUP:  load = ROM,     type = ro;
    LOWCODE:  load = ROM,     type = ro,  optional = yes;
    CODE:     load = ROM,     type = ro;
    RODATA:   load = ROM,     type = ro;
    # Writable initial values are forbidden by _start.S. BSS is valid RAM but
    # is deliberately not cleared during reset.
    DATA:     load = ROM, run = RAM, type = rw, define = yes;
    BSS:      load = RAM,     type = bss, define = yes;
    VECTORS:  load = VECTORS, type = ro;
}
